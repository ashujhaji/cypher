services:
  cypher:
    build: .
    image: cypher:local
    container_name: cypher
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - STORE_PATH=/app/data/store.json
      - CHANNEL_MAP_PATH=/app/config/channels.json
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
